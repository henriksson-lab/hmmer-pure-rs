[package]
name = "hmmer-pure-rs"
version = "0.6.0"
edition = "2021"
description = "Pure Rust port of HMMER 3.4 — biological sequence analysis using profile HMMs"
license = "BSD-3-Clause"
repository = "https://github.com/henriksson-lab/hmmer-pure-rs"
homepage = "https://github.com/henriksson-lab/hmmer-pure-rs"
documentation = "https://docs.rs/hmmer-pure-rs"
readme = "README.md"
keywords = ["bioinformatics", "hmm", "hmmer", "sequence-analysis", "profile-hmm"]
categories = ["science", "command-line-utilities"]
include = [
    "src/**/*.rs",
    "Cargo.toml",
    "README.md",
    "LICENSE",
]

[dependencies]
clap = { version = "4", features = ["derive"] }
anyhow = "1"
thiserror = "2"
rayon = "1"
divsufsort = "2"
flate2 = "1"
tracehash = { package = "tracehash-rs", version = "0.1", optional = true }

[features]
tracehash = ["dep:tracehash"]

[[bin]]
name = "hmmer"
path = "src/main.rs"

[dev-dependencies]
tempfile = "3"
deep-comparator-rs = { path = "../deep-comparator", default-features = false }

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
