# Rust <-> C function mapping for code-complexity-comparator.
#
# Default filename used by `ccc-rs` when run from this repo root:
#   ccc-rs compare rust.json c.json
#
# Covers hot-path and structural mappings where name normalization fails
# (e.g. C's `p7_G*` prefix, C's `p7_<module>_<Verb>` snake/CamelCase mix,
# and Rust's multiple SIMD variants that all correspond to one C engine).

# =================================================================
# Generic (non-SIMD) reference DP kernels — hmmer/src/generic_*.c
# =================================================================

[[entries]]
rust  = "g_forward"
other = "p7_GForward"

[[entries]]
rust  = "g_backward"
other = "p7_GBackward"

[[entries]]
rust  = "g_viterbi"
other = "p7_GViterbi"

